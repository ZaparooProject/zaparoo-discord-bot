# Discord settings
[discord]
# Role ID for authorized users (can use bot + messages included in context)
# Right-click the role in Server Settings -> Roles -> Copy Role ID (enable Developer Mode first)
authorized_role_id = 0

# GitHub authentication
# For personal token auth, set GITHUB_TOKEN in .env instead
[github]
# GitHub App auth (issues created as bot) - set all three:
# app_id = 123456
# app_private_key_path = "/path/to/private-key.pem"
# app_installation_id = 12345678

# OpenAI settings
[openai]
# Model for generating issue titles (default: gpt-4o)
# model = "gpt-4o"

# File hosting - files saved locally, served by nginx or similar
[files]
# Local directory to save downloaded files
images_dir = "./images"
# Public URL where files will be accessible (served by nginx)
images_url = "https://your-server.com/discord-files"
# Max attachment size in bytes (default: 10MB)
# max_attachment_size = 10485760

# Bot behavior
[bot]
# Number of previous messages to include as context (default: 5)
# context_messages = 5
# How long to wait for second reaction in two-step flow, seconds (default: 60)
# pending_timeout = 60

# Project configuration: emoji = ["owner/repo", "Display Name"]
# First project is the default when no project emoji is selected
[projects]
"🖥️" = ["ZaparooProject/zaparoo-core", "Core"]
"📱" = ["ZaparooProject/zaparoo-app", "App"]
"🎨" = ["ZaparooProject/zaparoo-designer", "Designer"]

# Issue type configuration: emoji = "label" (use "" for no label)
[issue_types]
"🐛" = "bug"
"💡" = "enhancement"
"📋" = ""
